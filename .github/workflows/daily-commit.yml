name: Hourly Green Commit

on:
  schedule:
    - cron: "0 * * * *" # runs every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  green-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          echo "Last active: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > LAST_ACTIVE.md
          echo "" >> LAST_ACTIVE.md
          echo "<!-- This file is auto-updated hourly to keep the contribution graph green -->" >> LAST_ACTIVE.md

      - name: Commit and push
        run: |
          git config user.name "amey1234444"
          git config user.email "ameybhagwatkar01@gmail.com"
          git add LAST_ACTIVE.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: activity $(date -u '+%Y-%m-%d %H:%M')" && git push)
